name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild build -project Veil.xcodeproj -scheme Veil -destination 'platform=macOS' -configuration Release

      - name: Test
        run: xcodebuild test -project Veil.xcodeproj -scheme Veil -destination 'platform=macOS' -only-testing:VeilTests

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: xcodebuild build -project Veil.xcodeproj -scheme Veil -destination 'platform=macOS' -configuration Release -derivedDataPath build

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/Veil.app"
          ditto -c -k --keepParent "$APP_PATH" Veil.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Veil.zip
          generate_release_notes: true
