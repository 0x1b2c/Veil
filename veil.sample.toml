# Veil configuration file
# Latest version: https://github.com/rainux/Veil/blob/master/veil.sample.toml

# Line height multiplier for the editor grid.
# A value of 1.2 is recommended for comfortable reading.
# line_height = 1.2

# Letter spacing multiplier for the editor grid.
# Values below 1.0 tighten character spacing, above 1.0 loosen it.
# Veil uses ceil() for cell width calculation, which may look slightly
# wider than terminals. Try 0.9 or 0.95 for a tighter look.
# letter_spacing = 1.0

# Enable font ligatures (e.g. -> becomes →  in supported fonts).
# ligatures = true

# Path to the nvim binary. Veil uses multi-layer automatic detection
# (cached path, login shell PATH, common Homebrew locations) which
# works in the vast majority of cases. Only set this if automatic
# detection resolves to a binary you don't want.
# nvim_path = ""

# Default NVIM_APPNAME for new windows. Leave empty to use "nvim".
# nvim_appname = ""

# By default, Veil lets nvim handle the tabline so you get the best
# experience from awesome tabline plugins. Set to true for a basic
# native macOS tab bar as a fallback.
# native_tabs = false

# Brightness offset for the title bar and tab bar, relative to the
# colorscheme background. Positive values lighten, negative values darken.
# titlebar_brightness_offset = -0.08
# tabbar_brightness_offset = 0.05

# Check for new Veil releases on GitHub at startup.
# Disable if you prefer not to make network requests.
# update_check = true

# Saved remote nvim connections. Start nvim on the remote host with
# `nvim --headless --listen 127.0.0.1:6666`, forward the port via SSH,
# then connect via Cmd+Ctrl+Shift+N. See README for SSH forwarding setup.
#
# [[remote]]
# name = "Dev Server"
# address = "127.0.0.1:6666"
#
# [[remote]]
# name = "Staging"
# address = "127.0.0.1:6667"
